<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>The Choppa by MATTBEAR</title>
<meta name="theme-color" content="#05060a">
<style>
:root{--line:#ffffff30;--txt:#fff4df;--mut:#d0c6b8;--r:#ff3a36;--o:#ff9a20;--y:#f6ff2e;--g:#75ff35;--c:#20e7ff;--b:#478bff;--v:#a65cff;--p:#ff3fa7}*{box-sizing:border-box}body{margin:0;background:#05060a;color:var(--txt);font:16px/1.35 Verdana,Tahoma,system-ui,sans-serif}button,input{touch-action:none}.wrap{width:min(1420px,calc(100% - 20px));margin:auto}.top{position:sticky;top:0;z-index:9;background:#05060af2;border-bottom:1px solid var(--line)}.nav{min-height:64px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font:900 2.2rem/.9 Georgia,serif}.rainbow{background:linear-gradient(90deg,var(--r),var(--o),var(--y),var(--g),var(--c),var(--v),var(--p));-webkit-background-clip:text;color:transparent}.status{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid var(--line);border-radius:99px;background:#0008;padding:8px 10px;color:var(--mut);font:900 .72rem ui-monospace,monospace;text-transform:uppercase}.ok{color:var(--g)}.hot{color:var(--r)}main{padding:14px 0 60px;display:grid;gap:14px}.card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(#151824e8,#07080df2);overflow:hidden}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.panel{padding:16px;display:grid;gap:12px}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.btn{min-height:50px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(#252a3b,#090b11);color:inherit;font:900 .82rem ui-monospace,monospace;text-transform:uppercase}.green,.on{background:linear-gradient(var(--g),#1d7b12);color:#031204}.yellow{background:linear-gradient(var(--y),#858300);color:#111}.red{background:linear-gradient(var(--r),#7b0909)}.pink{background:linear-gradient(var(--p),#730039)}.cyan{background:linear-gradient(var(--c),#087282);color:#021014}.box,.drop{border:1px solid var(--line);border-radius:12px;background:#0008;padding:12px;color:var(--mut)}.drop{border-style:dashed;text-align:center}.knob-head{padding:13px 16px 0;display:flex;justify-content:space-between;gap:10px;align-items:end}.knob-head h2{margin:0}.knob-head small{color:var(--mut);font:800 .68rem ui-monospace,monospace;text-transform:uppercase}.knobs{display:grid;grid-template-columns:repeat(7,minmax(100px,1fr));gap:10px;padding:12px 16px 16px;overflow-x:auto}.knob{--angle:-135deg;--col:var(--c);min-width:100px;border:1px solid var(--line);border-radius:14px;background:#05060ccc;padding:10px 7px;text-align:center;display:grid;gap:6px;place-items:center}.knob:nth-child(1){--col:var(--r)}.knob:nth-child(2){--col:var(--o)}.knob:nth-child(3){--col:var(--y)}.knob:nth-child(4){--col:var(--g)}.knob:nth-child(5){--col:var(--c)}.knob:nth-child(6){--col:var(--v)}.knob:nth-child(7){--col:var(--p)}.dial{width:64px;height:64px;border-radius:50%;position:relative;background:radial-gradient(circle at 35% 30%,#424858,#111 58%,#050607);box-shadow:0 0 14px #000,inset 0 0 0 4px #111}.dial:before{content:"";position:absolute;left:50%;top:7px;width:3px;height:22px;background:var(--col);border-radius:3px;transform-origin:50% 25px;transform:translateX(-50%) rotate(var(--angle));box-shadow:0 0 8px var(--col)}.knob label,.knob output{font:900 .68rem ui-monospace,monospace;text-transform:uppercase}.knob output{color:var(--mut)}.knob input{width:100%;accent-color:var(--col)}.knob.moved{box-shadow:0 0 28px var(--col),inset 0 0 18px #ffffff18;border-color:var(--col)}.pads{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;padding:16px}.pad{--col:var(--y);height:124px;border:2px solid var(--col);border-radius:15px;background:linear-gradient(#20232d,#0a0b10);color:white;position:relative;overflow:hidden;isolation:isolate;box-shadow:inset 0 -8px #0007,0 0 10px #000;transition:transform .05s ease,box-shadow .08s ease,filter .08s ease}.pad:nth-child(8n+1){--col:var(--r)}.pad:nth-child(8n+2){--col:var(--o)}.pad:nth-child(8n+3){--col:var(--y)}.pad:nth-child(8n+4){--col:var(--g)}.pad:nth-child(8n+5){--col:var(--c)}.pad:nth-child(8n+6){--col:var(--b)}.pad:nth-child(8n+7){--col:var(--v)}.pad:nth-child(8n+8){--col:var(--p)}.pad.empty{filter:grayscale(.35) brightness(.68);border-style:dashed}.pad.live,.pad.looping{background:linear-gradient(color-mix(in srgb,var(--col) 88%,white),var(--col) 35%,#0a0b10);color:#020304;filter:brightness(1.35) saturate(1.35);box-shadow:0 0 18px var(--col),0 0 42px color-mix(in srgb,var(--col) 72%,transparent),inset 0 0 30px #fff8;transform:translateY(1px) scale(.985)}.pad canvas{position:absolute;inset:11px 8px 9px;width:calc(100% - 16px);height:calc(100% - 20px);z-index:-1;opacity:.62}.pad.live canvas,.pad.looping canvas{opacity:.88}.pad em{position:absolute;inset:0;display:grid;place-items:center;font:900 2.8rem Georgia,serif;font-style:normal;text-shadow:0 2px 10px #000,0 0 14px #000;z-index:2}.pad.live em,.pad.looping em{text-shadow:0 1px 6px #fff8}.media,.media canvas{height:76px}.media{background:#020305}.media canvas{display:block;width:100%}@media(max-width:900px){.hero{grid-template-columns:1fr}.pads{grid-template-columns:repeat(4,1fr)}.knobs{grid-template-columns:repeat(7,100px)}}@media(max-width:520px){.pads{grid-template-columns:repeat(2,1fr)}.pad{height:112px}}
</style>
</head>
<body>
<header class="top"><div class="wrap nav"><div class="brand">The <span class="rainbow">Choppa</span></div><div class="status"><span id="audioState" class="pill hot">Audio Off</span><span id="sampleState" class="pill hot">No Sample</span><span id="midiState" class="pill">MIDI Off</span></div></div></header>
<main class="wrap">
<section class="hero"><div class="card panel"><h1>The <span class="rainbow">Choppa</span></h1><div class="row"><button id="start" class="btn green">Start</button><button id="loop" class="btn pink">Full Loop</button><button id="stop" class="btn red">Stop</button><button id="midi" class="btn cyan">MIDI</button></div><div id="status" class="box"><b>Ready.</b> Load audio or use Demo.</div></div><div class="card panel"><input id="file" type="file" accept="audio/*"><div id="drop" class="drop">Drop audio here</div><div class="row"><button id="demo" class="btn yellow">Demo</button><button id="grid" class="btn green">16 Grid</button><button id="smart" class="btn cyan">Smart</button><button id="clear" class="btn">Clear</button></div></div></section>
<section class="card"><div class="knob-head"><div><h2>FX</h2><small>Mouse, touch or Launchkey knobs</small></div><small id="ccReadout">CC 21–27 + 71–77</small></div><div id="knobs" class="knobs"></div></section>
<section class="card"><div id="pads" class="pads"></div></section>
<section class="card media"><canvas id="wave"></canvas></section>
</main>
<script>
(()=>{'use strict';
const $=id=>document.getElementById(id),N=16,keys=['1','2','3','4','5','6','7','8','q','w','e','r','t','y','u','i'],notes=[40,41,42,43,48,49,50,51,36,37,38,39,44,45,46,47];
const controls=[{id:'gain',label:'Gain',min:0,max:1.5,step:.01,value:.9},{id:'filter',label:'Filter',min:80,max:18000,step:1,value:18000,curve:'exp'},{id:'res',label:'Resonance',min:.1,max:18,step:.1,value:.7},{id:'pitch',label:'Pitch',min:-12,max:12,step:.1,value:0},{id:'release',label:'Release',min:.01,max:1.5,step:.01,value:.08,curve:'exp'},{id:'delay',label:'Delay',min:0,max:.7,step:.01,value:0},{id:'reverb',label:'Reverb',min:0,max:.7,step:.01,value:0}];
const ccBanks=[[21,22,23,24,25,26,27],[71,72,73,74,75,76,77]];
let ctx,master,filter,delay,delayGain,reverb,reverbGain,buff=null,slices=[],voices=new Set(),loops=new Map(),full=null,midiAccess=null,pressedKeys=new Set(),flashTimers=new Map();
const val=id=>+($(id)?.value||0),stat=t=>$('status').innerHTML=t,pill=(id,t,c='')=>{$(id).className='pill '+c;$(id).textContent=t};
function paint(){let live=new Set([...voices].map(v=>v.pad));document.querySelectorAll('.pad').forEach((p,i)=>{p.classList.toggle('empty',!slices[i]);p.classList.toggle('live',live.has(i));p.classList.toggle('looping',loops.has(i))});pill('sampleState',buff?'Slices '+slices.length:'No Sample',buff?'ok':'hot')}
function impulse(){let b=ctx.createBuffer(2,ctx.sampleRate,ctx.sampleRate);for(let c=0;c<2;c++){let d=b.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5)}return b}
async function audio(){try{if(!ctx){let AC=window.AudioContext||window.webkitAudioContext;ctx=new AC({latencyHint:'interactive'});master=ctx.createGain();filter=ctx.createBiquadFilter();filter.type='lowpass';delay=ctx.createDelay(1);delay.delayTime.value=.24;delayGain=ctx.createGain();reverb=ctx.createConvolver();reverb.buffer=impulse();reverbGain=ctx.createGain();filter.connect(master);filter.connect(delay);delay.connect(delayGain);delayGain.connect(master);filter.connect(reverb);reverb.connect(reverbGain);reverbGain.connect(master);master.connect(ctx.destination)}if(ctx.state==='suspended')await ctx.resume();apply();pill('audioState','Audio On','ok');return true}catch(e){stat('<b>Audio failed:</b> '+e.message);return false}}
function apply(){if(!ctx)return;let n=ctx.currentTime;master.gain.setTargetAtTime(val('gain'),n,.01);filter.frequency.setTargetAtTime(val('filter'),n,.01);filter.Q.setTargetAtTime(val('res'),n,.01);delayGain.gain.setTargetAtTime(val('delay'),n,.01);reverbGain.gain.setTargetAtTime(val('reverb'),n,.01)}
function setSlices(a,label){slices=a.filter(s=>s.end>s.start).slice(0,N);stopAll(false);draw();drawPadWaves();paint();stat('<b>'+label+'</b> ready.')}
function grid(){if(!buff)return;let d=buff.duration;setSlices(Array.from({length:N},(_,i)=>({start:d*i/N,end:d*(i+1)/N})),'16-grid chop')}
function smart(){if(!buff)return;let d=buff.getChannelData(0),sr=buff.sampleRate,hop=512,env=[],pts=[0],last=0;for(let i=0;i<d.length;i+=hop){let e=0;for(let j=0;j<hop&&i+j<d.length;j++)e+=Math.abs(d[i+j]);env.push(e/hop)}let avg=env.reduce((a,b)=>a+b,0)/env.length;for(let i=2;i<env.length-2;i++){let rise=env[i]-env[i-2];let t=i*hop/sr;if(rise>avg*.8&&env[i]>avg*1.25&&t-last>.08){pts.push(t);last=t}}pts=[...new Set(pts)].sort((a,b)=>a-b);while(pts.length<N){let best=0,gap=0;for(let i=0;i<pts.length;i++){let end=pts[i+1]??buff.duration;if(end-pts[i]>gap){gap=end-pts[i];best=i}}pts.splice(best+1,0,pts[best]+gap/2)}pts=pts.slice(0,N);setSlices(pts.map((p,i)=>({start:p,end:pts[i+1]||buff.duration})),'Adaptive smart chop')}
async function load(f){if(!f||!await audio())return;buff=await ctx.decodeAudioData(await f.arrayBuffer());smart()}
async function demo(){if(!await audio())return;let sr=ctx.sampleRate,b=ctx.createBuffer(1,sr*4,sr),d=b.getChannelData(0);for(let n=0;n<16;n++){let s=n*sr/4;for(let i=0;i<sr*.1;i++)d[s+i|0]+=Math.sin(2*Math.PI*(70+n*18)*i/sr)*Math.exp(-i/sr*24)}buff=b;grid()}
function make(i,loop=false){if(!ctx||!buff||!slices[i])return;let s=slices[i],src=ctx.createBufferSource(),g=ctx.createGain(),now=ctx.currentTime,rate=Math.pow(2,val('pitch')/12),raw=s.end-s.start,dur=raw/rate,atk=Math.min(dur*.08,.008),rel=Math.min(dur*.7,val('release'));src.buffer=buff;src.playbackRate.value=rate;src.connect(g);g.connect(filter);g.gain.setValueAtTime(.001,now);g.gain.exponentialRampToValueAtTime(.95,now+Math.max(.001,atk));if(loop){src.loop=true;src.loopStart=s.start;src.loopEnd=s.end;src.start(now,s.start)}else{g.gain.setValueAtTime(.95,now+Math.max(atk,dur-rel));g.gain.exponentialRampToValueAtTime(.001,now+dur);src.start(now,s.start,dur);src.stop(now+dur+.03)}return{src,pad:i}}
async function play(i){if(!await audio()||!slices[i])return;let v=make(i);if(!v)return;voices.add(v);paint();v.src.onended=()=>{voices.delete(v);paint()}}
function stopAll(msg=true){voices.forEach(v=>{try{v.src.stop()}catch{}});voices.clear();loops.forEach(v=>{try{v.src.stop()}catch{}});loops.clear();if(full){try{full.stop()}catch{}full=null}$('loop').classList.remove('on');pressedKeys.clear();paint();if(msg)stat('<b>Stopped.</b>')}
async function toggleFull(){if(!await audio()||!buff)return;if(full){try{full.stop()}catch{}full=null;$('loop').classList.remove('on');return}full=ctx.createBufferSource();full.buffer=buff;full.loop=true;full.connect(filter);full.start();$('loop').classList.add('on')}
function buildPads(){for(let i=0;i<N;i++){let p=document.createElement('button');p.className='pad empty';p.setAttribute('aria-label','Play slice '+(i+1)+' with '+keys[i].toUpperCase());p.innerHTML='<canvas></canvas><em>'+keys[i].toUpperCase()+'</em>';p.onpointerdown=e=>{e.preventDefault();play(i)};$('pads').appendChild(p)}paint()}
function drawPadWave(i){let p=$('pads').children[i],c=p?.querySelector('canvas');if(!c)return;let r=c.getBoundingClientRect(),dpr=devicePixelRatio||1;c.width=Math.max(1,r.width*dpr);c.height=Math.max(1,r.height*dpr);let x=c.getContext('2d'),w=c.width,h=c.height;x.clearRect(0,0,w,h);if(!buff||!slices[i])return;let s=slices[i],d=buff.getChannelData(0),a=Math.floor(s.start*buff.sampleRate),b=Math.min(d.length,Math.ceil(s.end*buff.sampleRate)),step=Math.max(1,Math.ceil((b-a)/w)),m=h/2;x.strokeStyle=getComputedStyle(p).getPropertyValue('--col').trim()||'#75ff35';x.lineWidth=Math.max(1,dpr);x.beginPath();for(let px=0;px<w;px++){let mn=1,mx=-1,base=a+px*step;for(let j=0;j<step&&base+j<b;j++){let v=d[base+j]||0;mn=Math.min(mn,v);mx=Math.max(mx,v)}x.moveTo(px,m+mn*m*.78);x.lineTo(px,m+mx*m*.78)}x.stroke()}
function drawPadWaves(){for(let i=0;i<N;i++)drawPadWave(i)}
function norm(c,n){return c.curve==='exp'?c.min*Math.pow(c.max/c.min,n):c.min+(c.max-c.min)*n}
function updateKnob(c,midi=false){let el=$(c.id),n=c.curve==='exp'?Math.log(el.value/c.min)/Math.log(c.max/c.min):(el.value-c.min)/(c.max-c.min),card=el.closest('.knob');card.style.setProperty('--angle',(-135+270*n)+'deg');card.querySelector('output').value=Number(el.value).toFixed(c.id==='filter'?0:2);apply();card.classList.add('moved');clearTimeout(flashTimers.get(c.id));flashTimers.set(c.id,setTimeout(()=>card.classList.remove('moved'),midi?170:110))}
function buildKnobs(){controls.forEach(c=>{let d=document.createElement('div');d.className='knob';d.innerHTML='<div class="dial"></div><label>'+c.label+'</label><output></output><input id="'+c.id+'" type="range" min="'+c.min+'" max="'+c.max+'" step="'+c.step+'" value="'+c.value+'">';$('knobs').appendChild(d);$(c.id).oninput=()=>updateKnob(c);updateKnob(c)})}
function setCC(cc,v){for(let b of ccBanks){let i=b.indexOf(cc);if(i>-1){let c=controls[i];$(c.id).value=norm(c,v/127);updateKnob(c,true);$('ccReadout').textContent='KNOB '+(i+1)+' · CC '+cc;return}}}
function draw(){let c=$('wave'),r=c.getBoundingClientRect(),dpr=devicePixelRatio||1;c.width=r.width*dpr;c.height=r.height*dpr;let x=c.getContext('2d'),w=c.width,h=c.height;x.fillStyle='#020305';x.fillRect(0,0,w,h);if(!buff)return;let d=buff.getChannelData(0),step=Math.max(1,Math.ceil(d.length/w)),m=h/2;x.strokeStyle='#75ff35';x.beginPath();for(let px=0;px<w;px++){let mn=1,mx=-1;for(let j=0;j<step;j++){let v=d[px*step+j]||0;mn=Math.min(mn,v);mx=Math.max(mx,v)}x.moveTo(px,m+mn*m*.82);x.lineTo(px,m+mx*m*.82)}x.stroke()}
async function midi(){if(!navigator.requestMIDIAccess)return;await audio();midiAccess=await navigator.requestMIDIAccess();const bind=()=>{let count=0;midiAccess.inputs.forEach(input=>{count++;input.onmidimessage=e=>{let[st,n,v]=e.data,type=st&240,i=notes.indexOf(n);if(type===144&&v>0&&i>-1)play(i);else if(type===176)setCC(n,v)}});pill('midiState',count?'MIDI On':'No Device',count?'ok':'hot')};bind();midiAccess.onstatechange=bind}
function bindKeyboard(){addEventListener('keydown',e=>{if(e.ctrlKey||e.metaKey||e.altKey)return;let k=e.key.toLowerCase(),i=keys.indexOf(k),editing=/textarea|select/i.test(e.target.tagName)||(e.target.tagName==='INPUT'&&e.target.type!=='range');if(i>-1&&!editing){e.preventDefault();if(pressedKeys.has(k))return;pressedKeys.add(k);play(i);return}if(editing||/button/i.test(e.target.tagName))return;if(e.code==='Space'&&!e.repeat){e.preventDefault();toggleFull()}else if(e.key==='Escape')stopAll()});addEventListener('keyup',e=>pressedKeys.delete(e.key.toLowerCase()));addEventListener('blur',()=>pressedKeys.clear());document.addEventListener('visibilitychange',()=>{if(document.hidden)pressedKeys.clear()})}
function bind(){buildKnobs();buildPads();bindKeyboard();$('start').onclick=audio;$('loop').onclick=toggleFull;$('stop').onclick=()=>stopAll();$('midi').onclick=midi;$('demo').onclick=demo;$('grid').onclick=grid;$('smart').onclick=smart;$('clear').onclick=()=>{stopAll(false);buff=null;slices=[];draw();drawPadWaves();paint()};$('file').onchange=e=>load(e.target.files[0]);let dz=$('drop');['dragenter','dragover'].forEach(n=>dz.addEventListener(n,e=>e.preventDefault()));dz.ondrop=e=>{e.preventDefault();load(e.dataTransfer.files[0])};addEventListener('resize',()=>{draw();drawPadWaves()});draw();drawPadWaves();paint()}bind();
})();
</script>
</body>
</html>
