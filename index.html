<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>The Choppa by MATTBEAR</title>
<meta name="theme-color" content="#05060a">
<style>
:root{--line:#ffffff30;--txt:#fff4df;--mut:#d0c6b8;--r:#ff3a36;--o:#ff9a20;--y:#f6ff2e;--g:#75ff35;--c:#20e7ff;--b:#478bff;--v:#a65cff;--p:#ff3fa7;--bg:url("assets/choppa-bg.svg")}
*{box-sizing:border-box}html{overscroll-behavior:none}body{margin:0;min-height:100vh;background:#05060a;color:var(--txt);font:18px/1.35 Verdana,Tahoma,system-ui,sans-serif;overscroll-behavior:none}body:before{content:"";position:fixed;inset:0;z-index:-2;background:linear-gradient(#05060acc,#05060af2),var(--bg) center/cover no-repeat}button,input,.pad{touch-action:none;-webkit-user-select:none;user-select:none}.wrap{width:min(1420px,calc(100% - 24px));margin:auto}.top{position:sticky;top:0;z-index:9;background:#05060af2;border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}.nav{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font:900 clamp(1.9rem,3.5vw,2.9rem)/.9 Georgia,serif;letter-spacing:-.07em}.rainbow{background:linear-gradient(90deg,var(--r),var(--o),var(--y),var(--g),var(--c),var(--v),var(--p));-webkit-background-clip:text;background-clip:text;color:transparent}.status{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid var(--line);border-radius:99px;background:#0008;padding:9px 12px;color:var(--mut);font:900 .78rem ui-monospace,Consolas,monospace;text-transform:uppercase}.ok{color:var(--g)}.hot{color:var(--r)}main{padding:16px 0 76px;display:grid;gap:16px}.card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(#151824e8,#07080df2);box-shadow:0 18px 44px #0008;overflow:hidden}.hero{display:grid;grid-template-columns:minmax(320px,1fr) minmax(370px,.9fr);gap:16px}.panel{padding:16px;display:grid;gap:12px}.hero .card:first-child{padding:20px;display:grid;gap:18px;align-content:space-between;background:linear-gradient(135deg,#ff3fa733,#20e7ff25,#f6ff2e18)}h1,h2{margin:0}h1{font:900 clamp(2.8rem,5.6vw,5.3rem)/.84 Georgia,serif;letter-spacing:-.09em;text-transform:uppercase}.sub{color:var(--mut);font:900 .82rem ui-monospace,Consolas,monospace;text-transform:uppercase}.row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.btn{min-height:50px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(#252a3b,#090b11);color:inherit;font:900 .9rem ui-monospace,Consolas,monospace;text-transform:uppercase;cursor:pointer;padding:10px}.btn.big{min-height:72px}.green,.on{background:linear-gradient(var(--g),#1d7b12);color:#031204}.yellow{background:linear-gradient(var(--y),#858300);color:#111}.red{background:linear-gradient(var(--r),#7b0909)}.pink{background:linear-gradient(var(--p),#730039)}.cyan{background:linear-gradient(var(--c),#087282);color:#021014}.box{border:1px solid var(--line);border-radius:13px;background:#0008;padding:13px;color:var(--mut)}input[type=file]{width:100%;min-height:46px;border:1px solid var(--line);border-radius:10px;background:#05060ccc;color:white;padding:9px;font:900 1rem Verdana,Tahoma,sans-serif}.drop{border:1px dashed #ffffff55;border-radius:13px;background:#0007;min-height:74px;display:grid;place-items:center;text-align:center;color:var(--mut);padding:12px}.pads{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:11px;padding:16px}.pad{--col:var(--y);height:124px;border:2px solid var(--col);border-radius:16px;background:linear-gradient(#20232d,#0a0b10);color:white;position:relative;overflow:hidden;box-shadow:inset 0 -8px #0007,0 0 18px #0008}.pad:nth-child(8n+1){--col:var(--r)}.pad:nth-child(8n+2){--col:var(--o)}.pad:nth-child(8n+3){--col:var(--y)}.pad:nth-child(8n+4){--col:var(--g)}.pad:nth-child(8n+5){--col:var(--c)}.pad:nth-child(8n+6){--col:var(--b)}.pad:nth-child(8n+7){--col:var(--v)}.pad:nth-child(8n+8){--col:var(--p)}.pad.empty{filter:grayscale(.45) brightness(.62);border-style:dashed}.pad.live,.pad.looping{background:linear-gradient(var(--col),#101114);color:#05060a;box-shadow:0 0 28px var(--col)}.pad b{position:absolute;left:10px;top:8px;font:900 .76rem ui-monospace,Consolas,monospace}.pad em{position:absolute;inset:0;display:grid;place-items:center;font:900 clamp(2.2rem,4vw,3.6rem)/.9 Georgia,serif;font-style:normal}.pad span{position:absolute;left:10px;right:10px;bottom:8px;display:flex;justify-content:space-between;font:900 .62rem ui-monospace,Consolas,monospace}.media{height:150px;background:#020305}.media canvas{display:block;width:100%;height:150px}
.knob-head{padding:14px 16px 0;display:flex;justify-content:space-between;gap:12px;align-items:end}.knob-head small{color:var(--mut);font:800 .7rem ui-monospace,Consolas,monospace;text-transform:uppercase}.knobs{display:grid;grid-template-columns:repeat(8,minmax(92px,1fr));gap:10px;padding:14px 16px 18px;overflow-x:auto}.knob{--angle:-135deg;--col:var(--c);min-width:92px;border:1px solid var(--line);border-radius:15px;background:#05060ccc;padding:12px 8px 10px;text-align:center;display:grid;gap:7px;place-items:center}.knob:nth-child(1){--col:var(--r)}.knob:nth-child(2){--col:var(--o)}.knob:nth-child(3){--col:var(--y)}.knob:nth-child(4){--col:var(--g)}.knob:nth-child(5){--col:var(--c)}.knob:nth-child(6){--col:var(--b)}.knob:nth-child(7){--col:var(--v)}.knob:nth-child(8){--col:var(--p)}.dial{width:68px;height:68px;border-radius:50%;position:relative;background:conic-gradient(from 225deg,var(--col) 0deg calc((var(--angle) + 135deg)*.75),#ffffff18 0 270deg,transparent 270deg);box-shadow:0 0 16px #000,inset 0 0 0 5px #111}.dial:after{content:"";position:absolute;inset:9px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#424858,#111 55%,#050607);box-shadow:inset 0 0 0 1px #ffffff24}.dial:before{content:"";position:absolute;z-index:2;left:50%;top:9px;width:3px;height:22px;background:var(--col);border-radius:3px;transform-origin:50% 25px;transform:translateX(-50%) rotate(var(--angle));box-shadow:0 0 8px var(--col)}.knob label{font:900 .7rem ui-monospace,Consolas,monospace;text-transform:uppercase;color:var(--txt)}.knob output{font:800 .72rem ui-monospace,Consolas,monospace;color:var(--mut)}.knob input{width:100%;accent-color:var(--col)}.knob.moved{box-shadow:0 0 22px var(--col);border-color:var(--col)}
@media(max-width:1100px){.hero{grid-template-columns:1fr}.pads{grid-template-columns:repeat(8,1fr)}}@media(max-width:720px){.wrap{width:calc(100% - 14px)}.row{grid-template-columns:repeat(2,1fr)}.pads{grid-template-columns:repeat(4,1fr);gap:8px;padding:10px}.pad{height:92px}.status .pill:nth-child(n+3){display:none}.knobs{grid-template-columns:repeat(8,96px)}}
</style>
</head>
<body>
<header class="top"><div class="wrap nav"><div class="brand">The <span class="rainbow">Choppa</span></div><div class="status"><span id="audioState" class="pill hot">Audio Off</span><span id="sampleState" class="pill hot">No Sample</span><span id="midiState" class="pill">MIDI Off</span></div></div></header>
<main class="wrap">
<section class="hero"><div class="card"><div><h1>The <span class="rainbow">Choppa</span></h1><div class="sub">16 instant chops · hold 3 sec to loop</div></div><div class="row"><button id="start" class="btn big green">Start</button><button id="loop" class="btn big pink">Full Loop</button><button id="stop" class="btn big red">Stop</button><button id="midi" class="btn big cyan">MIDI</button></div><div id="status" class="box"><b>Ready.</b> Load audio or use Demo, then hit pads.</div></div><div class="card"><div class="panel"><input id="file" type="file" accept="audio/*"><div id="drop" class="drop">Drop audio here</div><div class="row"><button id="demo" class="btn yellow">Demo</button><button id="grid" class="btn green">16 Grid</button><button id="smart" class="btn cyan">Smart</button><button id="clear" class="btn">Clear</button></div></div></div></section>
<section class="card"><div class="knob-head"><div><h2>Launchkey Knobs</h2><small>Left to right matches the eight physical knobs</small></div><small id="ccReadout">CC 21–28 + 71–78</small></div><div id="knobs" class="knobs"></div></section>
<section class="card"><div id="pads" class="pads"></div></section>
<section class="card"><div class="media"><canvas id="wave"></canvas></div></section>
</main>
<script>
(()=>{'use strict';
const $=id=>document.getElementById(id),N=16,keys=['1','2','3','4','5','6','7','8','q','w','e','r','t','y','u','i'],notes=[40,41,42,43,48,49,50,51,36,37,38,39,44,45,46,47];
const controls=[
{id:'gain',label:'Gain',min:0,max:1.5,step:.01,value:.9,fmt:v=>v.toFixed(2)},
{id:'filter',label:'Filter',min:80,max:18000,step:1,value:18000,curve:'exp',fmt:v=>v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)+'Hz'},
{id:'res',label:'Resonance',min:.1,max:18,step:.1,value:.7,fmt:v=>v.toFixed(1)},
{id:'pitch',label:'Pitch',min:-12,max:12,step:.1,value:0,fmt:v=>(v>0?'+':'')+v.toFixed(1)+'st'},
{id:'attack',label:'Attack',min:.001,max:.5,step:.001,value:.005,curve:'exp',fmt:v=>Math.round(v*1000)+'ms'},
{id:'release',label:'Release',min:.01,max:1.5,step:.01,value:.08,curve:'exp',fmt:v=>Math.round(v*1000)+'ms'},
{id:'delay',label:'Delay',min:0,max:.7,step:.01,value:0,fmt:v=>Math.round(v*100)+'%'},
{id:'reverb',label:'Reverb',min:0,max:.7,step:.01,value:0,fmt:v=>Math.round(v*100)+'%'}];
const ccBanks=[[21,22,23,24,25,26,27,28],[71,72,73,74,75,76,77,78]];
let ctx,master,filter,dry,delay,delayGain,reverb,reverbGain,buff=null,slices=[],active=null,loops=new Map(),full=null,holds=new Map(),midiAccess=null,flashTimers=new Map();
function stat(t){$('status').innerHTML=t}function pill(id,t,c=''){$ (id).className='pill '+c;$(id).textContent=t}
function value(id){return +($(id)?.value||0)}
function paint(){document.querySelectorAll('.pad').forEach((p,i)=>{p.classList.toggle('empty',!slices[i]);p.classList.toggle('live',active?.pad===i);p.classList.toggle('looping',loops.has(i))});pill('sampleState',buff?'Slices '+slices.length:'No Sample',buff?'ok':'hot')}
function buildImpulse(){let len=Math.max(1,Math.floor(ctx.sampleRate*1.6)),b=ctx.createBuffer(2,len,ctx.sampleRate);for(let c=0;c<2;c++){let d=b.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.4)}return b}
async function audio(){try{if(!ctx){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)throw Error('Web Audio unsupported');ctx=new AC({latencyHint:'interactive'});master=ctx.createGain();filter=ctx.createBiquadFilter();filter.type='lowpass';dry=ctx.createGain();delay=ctx.createDelay(1);delay.delayTime.value=.24;delayGain=ctx.createGain();reverb=ctx.createConvolver();reverb.buffer=buildImpulse();reverbGain=ctx.createGain();filter.connect(dry);dry.connect(master);filter.connect(delay);delay.connect(delayGain);delayGain.connect(master);filter.connect(reverb);reverb.connect(reverbGain);reverbGain.connect(master);master.connect(ctx.destination);applyAudioControls()}if(ctx.state==='suspended')await ctx.resume();applyAudioControls();pill('audioState','Audio On','ok');return true}catch(e){pill('audioState','Audio Error','hot');stat('<b>Audio failed:</b> '+e.message);return false}}
function applyAudioControls(){if(!ctx)return;let now=ctx.currentTime;master.gain.setTargetAtTime(value('gain'),now,.01);filter.frequency.setTargetAtTime(value('filter'),now,.01);filter.Q.setTargetAtTime(value('res'),now,.01);delayGain.gain.setTargetAtTime(value('delay'),now,.01);reverbGain.gain.setTargetAtTime(value('reverb'),now,.01)}
function setSlices(a,label){slices=a.filter(s=>s.end>s.start).slice(0,N);stopAll(false);draw();paint();stat('<b>'+label+'</b> ready. Pads trigger instantly.')}
function grid(){if(!buff)return stat('<b>No sample.</b> Upload audio or hit Demo.');let d=buff.duration;setSlices(Array.from({length:N},(_,i)=>({start:d*i/N,end:d*(i+1)/N})),'16-grid chop')}
function smart(){if(!buff)return;let data=buff.getChannelData(0),sr=buff.sampleRate,w=1024,en=[];for(let i=0;i<data.length;i+=w){let s=0;for(let j=0;j<w&&i+j<data.length;j++)s+=data[i+j]**2;en.push(Math.sqrt(s/w))}let avg=en.reduce((a,b)=>a+b,0)/en.length,pts=[0],last=0;for(let i=2;i<en.length-1;i++){let n=i*w;if(en[i]>en[i-1]*1.25&&en[i]>avg*1.35&&n-last>sr*.12){pts.push(n/sr);last=n}}if(pts.length<4)return grid();while(pts.length<N)pts.push(pts.length/N*buff.duration);pts=[...new Set(pts)].sort((a,b)=>a-b).slice(0,N);setSlices(pts.map((p,i)=>({start:p,end:pts[i+1]||buff.duration})),'Smart chop')}
async function load(f){if(!f||!await audio())return;try{buff=await ctx.decodeAudioData(await f.arrayBuffer());grid()}catch(e){stat('<b>Decode failed.</b> Try WAV, MP3, or M4A.')}}
async function demo(){if(!await audio())return;let sr=ctx.sampleRate,dur=4,b=ctx.createBuffer(1,sr*dur,sr),d=b.getChannelData(0);for(let n=0;n<16;n++){let start=Math.floor(n*dur/16*sr),freq=70+n*18;for(let i=0;i<sr*.12;i++){let x=i/sr;if(start+i<d.length)d[start+i]+=Math.sin(2*Math.PI*freq*x)*Math.exp(-x*22)*.8}}buff=b;grid()}
function make(i,loop=false){if(!ctx||!buff||!slices[i])return null;let s=slices[i],raw=Math.max(.02,s.end-s.start),src=ctx.createBufferSource(),g=ctx.createGain(),now=ctx.currentTime,atk=Math.min(raw*.45,value('attack')),rel=Math.min(raw*.7,value('release'));src.buffer=buff;src.playbackRate.value=Math.pow(2,value('pitch')/12);src.connect(g);g.connect(filter);g.gain.setValueAtTime(.001,now);g.gain.exponentialRampToValueAtTime(.95,now+Math.max(.001,atk));if(loop){src.loop=true;src.loopStart=s.start;src.loopEnd=s.end;src.start(now,s.start)}else{let dur=raw/src.playbackRate.value;g.gain.setValueAtTime(.95,now+Math.max(atk,dur-rel));g.gain.exponentialRampToValueAtTime(.001,now+dur);src.start(now,s.start,dur);src.stop(now+dur+.03)}return{src,pad:i}}
async function play(i){if(!await audio()||!slices[i])return stat('<b>No slice.</b> Load audio or hit Demo.');if(active){try{active.src.stop()}catch{}}let o=make(i);if(!o)return;active=o;paint();o.src.onended=()=>{if(active===o)active=null;paint()};stat('<b>'+keys[i].toUpperCase()+'</b> chopped.')}
async function toggleLoop(i){if(!await audio()||!slices[i])return;if(loops.has(i)){try{loops.get(i).src.stop()}catch{}loops.delete(i)}else loops.set(i,make(i,true));paint()}
function stopAll(message=true){if(active){try{active.src.stop()}catch{}active=null}loops.forEach(o=>{try{o.src.stop()}catch{}});loops.clear();if(full){try{full.stop()}catch{}full=null;$('loop').classList.remove('on')}holds.forEach(h=>clearTimeout(h.timer));holds.clear();paint();if(message)stat('<b>Stopped.</b>')}
async function toggleFull(){if(!await audio())return;if(!buff)return demo();if(full){try{full.stop()}catch{}full=null;$('loop').classList.remove('on');return}full=ctx.createBufferSource();full.buffer=buff;full.loop=true;full.playbackRate.value=Math.pow(2,value('pitch')/12);full.connect(filter);full.start();$('loop').classList.add('on')}
function buildPads(){let box=$('pads');for(let i=0;i<N;i++){let p=document.createElement('button');p.className='pad empty';p.innerHTML='<b>PAD '+(i+1)+'</b><em>'+keys[i].toUpperCase()+'</em><span><i>HOLD LOOP</I><i>MIDI '+notes[i]+'</i></span>';p.onpointerdown=e=>{e.preventDefault();if(holds.has(e.pointerId))return;try{p.setPointerCapture(e.pointerId)}catch{}play(i);let timer=setTimeout(()=>toggleLoop(i),3000);holds.set(e.pointerId,{timer})};const up=e=>{let h=holds.get(e.pointerId);if(h){clearTimeout(h.timer);holds.delete(e.pointerId)}};p.onpointerup=up;p.onpointercancel=up;p.onlostpointercapture=up;box.appendChild(p)}paint()}
function normToValue(c,n){return c.curve==='exp'?c.min*Math.pow(c.max/c.min,n):c.min+(c.max-c.min)*n}
function updateKnob(c,fromMidi=false){let el=$(c.id),v=+el.value,n=c.curve==='exp'?Math.log(v/c.min)/Math.log(c.max/c.min):(v-c.min)/(c.max-c.min),card=el.closest('.knob');card.style.setProperty('--angle',(-135+270*Math.max(0,Math.min(1,n)))+'deg');card.querySelector('output').value=c.fmt(v);applyAudioControls();if(fromMidi){card.classList.add('moved');clearTimeout(flashTimers.get(c.id));flashTimers.set(c.id,setTimeout(()=>card.classList.remove('moved'),140))}}
function buildKnobs(){let box=$('knobs');controls.forEach(c=>{let card=document.createElement('div');card.className='knob';card.innerHTML='<div class="dial" aria-hidden="true"></div><label for="'+c.id+'">'+c.label+'</label><output></output><input id="'+c.id+'" type="range" min="'+c.min+'" max="'+c.max+'" step="'+c.step+'" value="'+c.value+'">';box.appendChild(card);$(c.id).oninput=()=>updateKnob(c);updateKnob(c)})}
function setFromCC(cc,v){let idx=-1;for(const bank of ccBanks){let found=bank.indexOf(cc);if(found>-1){idx=found;break}}if(idx<0)return false;let c=controls[idx],el=$(c.id);el.value=normToValue(c,v/127);updateKnob(c,true);$('ccReadout').textContent='KNOB '+(idx+1)+' · CC '+cc+' · '+c.label;return true}
function draw(){let c=$('wave'),r=c.getBoundingClientRect(),dpr=devicePixelRatio||1;c.width=Math.max(320,r.width*dpr);c.height=Math.max(100,r.height*dpr);let x=c.getContext('2d'),w=c.width,h=c.height;x.fillStyle='#020305';x.fillRect(0,0,w,h);if(!buff)return;let data=buff.getChannelData(0),step=Math.max(1,Math.ceil(data.length/w)),mid=h/2;x.strokeStyle='#75ff35';x.beginPath();for(let px=0;px<w;px++){let mn=1,mx=-1;for(let j=0;j<step;j++){let v=data[px*step+j]||0;mn=Math.min(mn,v);mx=Math.max(mx,v)}x.moveTo(px,mid+mn*mid*.85);x.lineTo(px,mid+mx*mid*.85)}x.stroke()}
async function midi(){if(!navigator.requestMIDIAccess)return pill('midiState','MIDI Unsupported','hot');if(!await audio())return;try{midiAccess=await navigator.requestMIDIAccess();const bind=()=>{let count=0;midiAccess.inputs.forEach(input=>{count++;input.onmidimessage=e=>{let[st,n,v]=e.data,type=st&240,idx=notes.indexOf(n);if(type===144&&v>0&&idx>-1)play(idx);else if(type===176)setFromCC(n,v)}});pill('midiState',count?'MIDI On':'No Device',count?'ok':'hot')};bind();midiAccess.onstatechange=bind;stat('<b>MIDI connected.</b> Launchkey pads and knobs are live.')}catch(e){pill('midiState','MIDI Blocked','hot');stat('<b>MIDI blocked.</b> Use Chrome or Edge and allow MIDI access.')}}
function bind(){buildKnobs();buildPads();$('start').onclick=audio;$('loop').onclick=toggleFull;$('stop').onclick=()=>stopAll();$('midi').onclick=midi;$('demo').onclick=demo;$('grid').onclick=grid;$('smart').onclick=smart;$('clear').onclick=()=>{stopAll(false);buff=null;slices=[];draw();paint();stat('<b>Cleared.</b>')};$('file').onchange=e=>load(e.target.files[0]);addEventListener('keydown',e=>{if(e.repeat||/input|textarea|select/i.test(e.target.tagName))return;let i=keys.indexOf(e.key.toLowerCase());if(i>-1){e.preventDefault();play(i)}else if(e.code==='Space'){e.preventDefault();toggleFull()}else if(e.key==='Escape')stopAll()});let dz=$('drop');['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>e.preventDefault()));dz.addEventListener('drop',e=>{e.preventDefault();load(e.dataTransfer.files[0])});addEventListener('resize',draw);draw();paint()}
bind();
})();
</script>
</body>
</html>
