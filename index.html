<style>
:root{--bg:#020405;--panel:#090d10;--panel2:#11161a;--edge:#26323a;--txt:#eafcff;--muted:#8da0a8;--cyan:#19e6ff;--pink:#ff34ef;--red:#ff384a;--amber:#ffb23b;--green:#45ff64;--blue:#58a6ff;--violet:#b35cff;--gold:#f5e65b}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;color:var(--txt);font-family:Georgia,serif;overflow-x:hidden}button,input,select{font:inherit}button{cursor:pointer;color:inherit}.bg{position:fixed;inset:0;z-index:-5;background:radial-gradient(circle at 42% 25%,rgba(25,230,255,.15),transparent 27%),radial-gradient(circle at 78% 70%,rgba(255,56,74,.12),transparent 25%),linear-gradient(#030606,#000 70%)}.bg:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(25,230,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(25,230,255,.035) 1px,transparent 1px);background-size:28px 28px;mask-image:linear-gradient(90deg,transparent,#000 18%,#000 82%,transparent);animation:drift 24s linear infinite}.machine{width:min(1900px,100vw);min-height:100vh;margin:auto;padding:5.2vh 1.2vw 3vh;display:grid;grid-template-columns:minmax(250px,1.06fr) minmax(440px,1.75fr) minmax(330px,.92fr);grid-template-rows:auto auto 1fr;gap:14px}.frame,.hero,.side,.module,.bottom{position:relative;background:linear-gradient(180deg,rgba(22,27,31,.86),rgba(3,5,7,.92));border:1px solid rgba(117,151,162,.28);box-shadow:0 0 0 1px rgba(0,0,0,.9),inset 0 0 34px rgba(255,255,255,.035),0 22px 70px rgba(0,0,0,.65);clip-path:polygon(1.3% 0,98.5% 0,100% 8%,100% 92%,98.4% 100%,1.5% 100%,0 92%,0 8%)}.frame:before,.hero:before,.side:before,.module:before,.bottom:before{content:"";position:absolute;inset:8px;border:1px solid rgba(25,230,255,.1);pointer-events:none}.wavePanel{grid-column:1;grid-row:1/4;padding:72px 18px 18px;overflow:hidden}.center{grid-column:2;grid-row:1/3;min-height:610px;padding:58px 30px 28px;display:grid;align-content:center;justify-items:center;overflow:hidden}.side{grid-column:3;grid-row:1/4;padding:56px 18px 18px;display:grid;align-content:start;gap:14px}.bottom{grid-column:2;grid-row:3;padding:20px}.topRail{position:absolute;left:22px;right:22px;top:16px;height:54px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(90deg,transparent,rgba(25,230,255,.11),transparent);clip-path:polygon(5% 0,95% 0,100% 100%,0 100%)}.topRail:after{content:"";position:absolute;left:36%;right:36%;top:17px;height:10px;background:repeating-linear-gradient(90deg,var(--cyan) 0 3px,transparent 3px 8px);box-shadow:0 0 18px var(--cyan)}.wave{position:absolute;left:0;right:0;top:112px;height:250px;background:linear-gradient(90deg,rgba(25,230,255,.05),rgba(255,52,239,.05),rgba(255,178,59,.05),rgba(69,255,100,.05));border-top:1px solid rgba(25,230,255,.15);border-bottom:1px solid rgba(25,230,255,.12);overflow:hidden}.wave canvas{width:100%;height:100%;display:block}.sliceGrid{position:absolute;left:18px;right:18px;top:92px;height:330px;display:grid;grid-template-columns:repeat(16,1fr);gap:4px;pointer-events:none}.sliceCell{border-left:1px solid rgba(25,230,255,.18);border-right:1px solid rgba(255,255,255,.035);color:rgba(255,255,255,.6);font:700 11px system-ui;padding:4px 2px;text-align:center;text-shadow:0 0 8px currentColor}.sliceCell.loaded{box-shadow:inset 0 -3px currentColor;color:var(--cyan)}.readouts{position:absolute;left:22px;right:22px;bottom:32px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.readout{border:1px solid rgba(25,230,255,.14);background:rgba(0,0,0,.36);padding:10px;font:700 13px system-ui;text-transform:uppercase;color:var(--muted)}.readout b{display:block;color:var(--cyan);font:400 18px Georgia,serif;margin-top:3px}.bigTop{color:var(--cyan);font:700 clamp(26px,4vw,64px) system-ui;letter-spacing:.42em;text-shadow:0 0 22px rgba(25,230,255,.8);margin-bottom:18px}.title{font:900 clamp(78px,13vw,250px)/.78 Impact,Haettenschweiler,"Arial Black",sans-serif;letter-spacing:-.07em;text-transform:uppercase;color:#c7c9c8;text-shadow:0 2px 0 #fff,0 -2px 0 #202426,0 0 26px rgba(25,230,255,.36),-16px 22px 0 rgba(0,0,0,.75);filter:drop-shadow(0 0 12px rgba(255,52,239,.25))}.title span{display:inline-block;background:linear-gradient(180deg,#f4f4f2 0,#777 36%,#202326 39%,#b4b4b2 58%,#313537 100%);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-stroke:2px rgba(255,255,255,.35)}.subtitle{margin-top:34px;font:700 clamp(18px,2vw,36px) system-ui;letter-spacing:.48em;color:var(--cyan);text-shadow:0 0 16px var(--cyan)}.rain{position:absolute;left:17%;right:17%;bottom:36px;height:20px;background:repeating-linear-gradient(90deg,#00e5ff 0 5px,#3285ff 5px 10px,#b35cff 10px 15px,#ff34ef 15px 20px,#ff384a 20px 25px,#ffb23b 25px 30px,#f5e65b 30px 35px,#45ff64 35px 40px);filter:drop-shadow(0 0 13px rgba(25,230,255,.8));clip-path:polygon(4% 0,96% 0,100% 100%,0 100%)}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.tab{height:36px;border:1px solid rgba(255,255,255,.08);background:#06090b;color:var(--muted);font:900 12px system-ui;letter-spacing:.12em;text-transform:uppercase}.tab:nth-child(1){color:#ff6976;box-shadow:inset 0 -3px #ff384a}.tab:nth-child(2){color:#ffca64;box-shadow:inset 0 -3px #ffb23b}.tab:nth-child(3){color:#7bff78;box-shadow:inset 0 -3px #45ff64}.tab:nth-child(4){color:#19e6ff;box-shadow:inset 0 -3px #19e6ff}.pads{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.pad{height:76px;border:1px solid currentColor;background:radial-gradient(circle at 40% 80%,rgba(255,255,255,.12),transparent 40%),rgba(0,0,0,.42);border-radius:4px;position:relative;font:900 13px system-ui;color:var(--cyan);box-shadow:0 0 18px rgba(25,230,255,.12),inset 0 -3px currentColor}.pad small{position:absolute;left:8px;top:6px;color:currentColor}.pad b{position:absolute;left:8px;bottom:8px;color:rgba(255,255,255,.78)}.pad.hit{filter:brightness(1.6);box-shadow:0 0 28px currentColor,inset 0 0 20px currentColor}.pad.looping{outline:2px solid white}.p0,.p8{color:#ff384a}.p1,.p9{color:#ff8b32}.p2,.p10{color:#ffdb4d}.p3,.p11{color:#d6ff4d}.p4,.p12{color:#45ff64}.p5,.p13{color:#20ffc8}.p6,.p14{color:#19e6ff}.p7,.p15{color:#b35cff}.knobs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.knob{--pct:.5;text-align:center;font:800 11px system-ui;text-transform:uppercase;color:var(--muted)}.dial{position:relative;width:68px;height:68px;margin:5px auto;border-radius:50%;background:radial-gradient(circle at 35% 30%,#333,#030303 65%);border:2px solid #111;box-shadow:0 0 0 2px rgba(255,255,255,.04),0 0 20px currentColor}.dial:after{content:"";position:absolute;left:50%;top:8px;width:4px;height:22px;background:currentColor;border-radius:4px;transform-origin:50% 26px;transform:translateX(-50%) rotate(calc(var(--pct)*270deg - 135deg));box-shadow:0 0 10px currentColor}.dial input{position:absolute;inset:-6px;opacity:0;z-index:2}.knob:nth-child(1){color:#ff384a}.knob:nth-child(2){color:#ff34ef}.knob:nth-child(3){color:#19e6ff}.knob:nth-child(4){color:#45ff64}.knob output{display:block;color:var(--txt);font-size:10px}.controls{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.btn{min-height:46px;border:1px solid rgba(25,230,255,.28);background:linear-gradient(180deg,#11171b,#050708);color:var(--txt);font:900 12px system-ui;letter-spacing:.08em;text-transform:uppercase;box-shadow:inset 0 -3px rgba(25,230,255,.25),0 0 18px rgba(25,230,255,.08)}.btn:hover{filter:brightness(1.25)}.btn.red{border-color:rgba(255,56,74,.48);box-shadow:inset 0 -3px #ff384a,0 0 20px rgba(255,56,74,.18)}.btn.gold{border-color:rgba(255,178,59,.45);box-shadow:inset 0 -3px #ffb23b}.btn.green{border-color:rgba(69,255,100,.45);box-shadow:inset 0 -3px #45ff64}.status{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.pill{border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.34);padding:9px;color:var(--muted);font:800 11px system-ui;text-transform:uppercase}.pill.ok{color:var(--green)}.pill.hot{color:var(--pink)}.file{display:none}.log{margin-top:12px;min-height:58px;border:1px solid rgba(25,230,255,.18);padding:10px;background:rgba(0,0,0,.38);color:var(--muted);font:700 13px system-ui}.piano{display:grid;grid-template-columns:repeat(10,1fr);gap:7px;margin-top:14px}.key{height:52px;border:1px solid rgba(255,255,255,.15);background:#d9dedb;color:#111;font:900 12px system-ui}.key.black{background:#050608;color:#fff}.key.hit{box-shadow:0 0 20px var(--cyan);filter:brightness(1.4)}@keyframes drift{to{transform:translate(-28px,-28px)}}@media(max-width:1050px){.machine{display:block;padding:8px}.wavePanel,.center,.side,.bottom{margin-bottom:10px;min-height:auto}.center{padding:70px 12px 90px}.title{font-size:22vw}.wavePanel{height:450px}.side{padding-top:50px}.controls{grid-template-columns:repeat(2,1fr)}.knobs{grid-template-columns:repeat(4,1fr)}}@media(max-width:620px){.pads{grid-template-columns:repeat(4,1fr)}.pad{height:60px}.knobs{grid-template-columns:repeat(2,1fr)}.status,.readouts{grid-template-columns:1fr}.subtitle{letter-spacing:.25em}.bigTop{letter-spacing:.25em}.sliceGrid{grid-template-columns:repeat(8,1fr)}}
</style>

<body>
<div class="bg"></div>
<main class="machine">
<section class="frame wavePanel"><div class="topRail"></div><div id="sliceGrid" class="sliceGrid"></div><div class="wave"><canvas id="wave"></canvas></div><div class="readouts"><div class="readout">BPM <b>128.0</b></div><div class="readout">KEY <b>C#m</b></div><div class="readout">MODE <b id="modeMini">SYNC</b></div></div></section>
<section class="hero center"><div class="topRail"></div><div class="bigTop">THE</div><div class="title"><span>CHOPPA</span></div><div class="subtitle">SMART LOOP SLICER</div><div class="rain"></div></section>
<aside class="side"><div class="topRail"></div><div class="status"><span id="audioState" class="pill">Audio asleep</span><span id="midiState" class="pill">External off</span><span id="sliceState" class="pill hot">No slices</span></div><div class="tabs"><button class="tab">Slice</button><button class="tab">Perform</button><button class="tab">FX</button><button class="tab">Seq</button></div><div id="pads" class="pads"></div><section class="module"><h2>FX</h2><div id="knobs" class="knobs"></div></section><section class="module"><h2>HOSSilator</h2><div id="piano" class="piano"></div></section></aside>
<section class="bottom"><div class="controls"><button id="startBtn" class="btn gold">Start Audio</button><button id="demoBtn" class="btn green">Demo Loop</button><button id="uploadBtn" class="btn">Upload Audio</button><button id="midiBtn" class="btn">Enable MIDI</button><button id="modeBtn" class="btn">Mode: One Shot</button><button id="chokeBtn" class="btn">Choke: On</button><button id="reverseBtn" class="btn">Reverse</button><button id="panicBtn" class="btn red">Stop All</button></div><input id="fileInput" class="file" type="file" accept="audio/*"><div id="log" class="log">Load demo or audio. Pads map to 1-8 and Q-I. Yes, it finally looks less like a spreadsheet in a trenchcoat.</div></section>
</main>
<script>
(()=>{const $=id=>document.getElementById(id),q=['1','2','3','4','5','6','7','8','q','w','e','r','t','y','u','i'],colors=['#ff384a','#ff8b32','#ffdb4d','#d6ff4d','#45ff64','#20ffc8','#19e6ff','#b35cff'];let ctx,ui,master,filter,delay,delayGain,fb,analyser,sourceTap,buffer=null,slices=[],active=[],loops=new Set(),held=new Map(),mode='oneshot',choke=true,midiOuts=[],midiHeld=new Set();const padMap=[40,41,42,43,48,49,50,51,36,37,38,39,44,45,46,47];const modes={oneshot:'One Shot',gate:'Gate',loop:'Slice Loop',full:'Full Loop'};const knobDefs=[['volume','Output',0,1,.01,.82,v=>Math.round(v*100)+'%'],['transient','Transient',0,1,.01,.35,v=>Math.round(v*100)+'%'],['swing','Swing',0,1,.01,.16,v=>Math.round(v*100)+'%'],['filter','Filter',200,16000,50,12000,v=>Math.round(v)],['pitch','Pitch',-12,12,1,0,v=>v],['glitch','Glitch',0,1,.01,0,v=>Math.round(v*100)+'%'],['delay','Delay',0,1,.01,.1,v=>Math.round(v*100)+'%'],['hoss','HOSS',0,1,.01,.75,v=>Math.round(v*100)+'%']];function log(t){$('log').textContent=t}function status(id,t,c=''){$(id).textContent=t;$(id).className='pill '+c}function click(kind='soft'){try{const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;if(!ui)ui=new AC();if(ui.state!=='running')ui.resume();let o=ui.createOscillator(),g=ui.createGain();o.type='triangle';o.frequency.value=kind==='bad'?130:kind==='knob'?520:760;g.gain.setValueAtTime(.0001,ui.currentTime);g.gain.exponentialRampToValueAtTime(kind==='bad'?.12:.055,ui.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,ui.currentTime+.075);o.connect(g).connect(ui.destination);o.start();o.stop(ui.currentTime+.08)}catch(e){}}document.addEventListener('pointerdown',e=>{let b=e.target.closest('button');if(b)click(b.classList.contains('red')?'bad':'soft')},{passive:true});document.addEventListener('input',e=>{if(e.target.type==='range')click('knob')},{passive:true});async function audio(){try{if(!ctx){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return false;ctx=new AC();master=ctx.createGain();filter=ctx.createBiquadFilter();delay=ctx.createDelay(1.2);delayGain=ctx.createGain();fb=ctx.createGain();analyser=ctx.createAnalyser();sourceTap=ctx.createGain();analyser.fftSize=512;filter.type='lowpass';sourceTap.connect(filter);filter.connect(master);filter.connect(delay);delay.connect(fb);fb.connect(delay);delay.connect(delayGain);delayGain.connect(master);master.connect(analyser);analyser.connect(ctx.destination);applyFX();drawWave()}if(ctx.state!=='running')await ctx.resume();status('audioState','Audio ready','ok');return true}catch(e){console.error(e);status('audioState','Audio failed','hot');return false}}function val(id){return +$(id).value}function pct(id){let e=$(id);return (+e.value-+e.min)/(+e.max-+e.min)}function buildKnobs(){let k=$('knobs');k.innerHTML='';knobDefs.forEach(([id,label,min,max,step,v,fmt])=>{let d=document.createElement('div');d.className='knob';d.innerHTML=`<div>${label}</div><div class="dial"><input id="${id}" type="range" min="${min}" max="${max}" step="${step}" value="${v}"></div><output id="${id}Val">${fmt(v)}</output>`;k.appendChild(d);$(id).oninput=applyFX});applyFX()}function applyFX(){knobDefs.forEach(([id,,,,,,fmt])=>{let e=$(id);if(!e)return;e.closest('.knob').style.setProperty('--pct',pct(id));$(id+'Val').textContent=fmt(+e.value)});if(!ctx)return;filter.frequency.value=val('filter');delay.delayTime.value=.05+val('delay')*.42;delayGain.gain.value=val('delay')*.35;fb.gain.value=.08+val('delay')*.48}function buildPads(){let p=$('pads');p.innerHTML='';for(let i=0;i<16;i++){let b=document.createElement('button');b.className='pad p'+i;b.style.color=colors[i%8];b.innerHTML=`<small>${i+1}</small><b>${q[i].toUpperCase()}</b>`;b.onpointerdown=e=>{e.preventDefault();padDown(i)};b.onpointerup=e=>{e.preventDefault();padUp(i)};b.onpointercancel=()=>padUp(i);p.appendChild(b)}}function buildGrid(){let g=$('sliceGrid');g.innerHTML='';for(let i=0;i<16;i++){let c=document.createElement('div');c.id='slice'+i;c.className='sliceCell';c.style.color=colors[i%8];c.textContent=i+1;g.appendChild(c)}}function setGrid(){for(let i=0;i<16;i++){let c=$('slice'+i);if(slices[i]){c.classList.add('loaded');c.innerHTML=`${i+1}<br>${slices[i][0].toFixed(1)}s`}else{c.classList.remove('loaded');c.textContent=i+1}}}function buildPiano(){let p=$('piano'),names=['C','C#','D','D#','E','F','F#','G','G#','A'];p.innerHTML='';for(let i=0;i<10;i++){let b=document.createElement('button');b.className='key '+([1,3,6,8].includes(i)?'black':'');b.textContent=names[i];b.onclick=()=>playHoss(60+i,1,b);p.appendChild(b)}}function chop(){if(!buffer){slices=[];setGrid();status('sliceState','No slices','hot');return}let d=buffer.duration;slices=[];for(let i=0;i<16;i++)slices.push([d*i/16,d*(i+1)/16]);setGrid();status('sliceState','16 slices','ok');log('Full song chopped into 16 slices. Civilization briefly functions.')}function stop(e){try{e&&e.src&&e.src.stop()}catch{}}function stopAll(clear=true){active.forEach(stop);active=[];held.clear();if(clear){loops.clear();[...$('pads').children].forEach(p=>p.classList.remove('looping'))}}function hit(i){let p=$('pads').children[i];if(!p)return;p.classList.add('hit');setTimeout(()=>p.classList.remove('hit'),120)}function makeSource(st,dur,vel=1,loop=false){let src=ctx.createBufferSource(),g=ctx.createGain(),now=ctx.currentTime;src.buffer=buffer;src.playbackRate.value=Math.pow(2,val('pitch')/12);src.loop=loop;src.loopStart=st;src.loopEnd=Math.min(buffer.duration,st+dur);g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(val('volume')*vel,now+.006);if(!loop){g.gain.setValueAtTime(val('volume')*vel,now+Math.max(.01,dur-.06));g.gain.linearRampToValueAtTime(0,now+dur+.04);src.stop(now+dur+.06)}src.connect(g).connect(sourceTap);src.start(now,st,loop?undefined:dur);return{src,pad:null}}async function trigger(i,vel=1,gate=false){if(!(await audio()))return;if(!buffer||!slices[i]){playHoss(60+i,vel);hit(i);return}if(choke&&!gate)stopAll(true);let[st,en]=slices[i],dur=Math.max(.05,en-st),e=makeSource(st,dur,vel,gate);e.pad=i;active.push(e);hit(i);log('Slice '+(i+1)+' fired: '+st.toFixed(2)+'s');e.src.onended=()=>{active=active.filter(x=>x!==e);if(loops.has(i))trigger(i,vel,true)};return e}async function padDown(i){if(mode==='gate'){let e=await trigger(i,1,true);if(e)held.set(i,e);return}if(mode==='loop'){if(loops.has(i)){loops.delete(i);$('pads').children[i].classList.remove('looping');active.filter(x=>x.pad===i).forEach(stop);active=active.filter(x=>x.pad!==i)}else{loops.add(i);$('pads').children[i].classList.add('looping');trigger(i,1,true)}return}trigger(i)}function padUp(i){if(mode==='gate'){let e=held.get(i);if(e){stop(e);held.delete(i);active=active.filter(x=>x!==e)}}}function curve(a){let n=1024,c=new Float32Array(n),k=a*80;for(let i=0;i<n;i++){let x=i*2/n-1;c[i]=(1+k)*x/(1+k*Math.abs(x))}return c}async function playHoss(note=60,vel=1,el=null){if(!(await audio()))return;let now=ctx.currentTime,osc=ctx.createOscillator(),sub=ctx.createOscillator(),g=ctx.createGain(),ws=ctx.createWaveShaper(),f=ctx.createBiquadFilter(),hz=440*Math.pow(2,(note-69+val('pitch'))/12);osc.type=val('glitch')>.4?'square':'sawtooth';sub.type='square';osc.frequency.value=hz;sub.frequency.value=hz/2;ws.curve=curve(val('transient'));f.type='lowpass';f.frequency.value=val('filter');g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(val('hoss')*vel,now+.01);g.gain.exponentialRampToValueAtTime(.001,now+.35);osc.connect(ws);sub.connect(ws);ws.connect(f).connect(g).connect(master);if(val('delay')>.02)g.connect(delay);osc.start();sub.start();osc.stop(now+.42);sub.stop(now+.42);if(el){el.classList.add('hit');setTimeout(()=>el.classList.remove('hit'),130)}}async function demo(){if(!(await audio()))return;let sr=ctx.sampleRate,dur=4,b=ctx.createBuffer(1,sr*dur,sr),d=b.getChannelData(0);for(let i=0;i<d.length;i++){let t=i/sr,beat=(t*4)%1,bar=Math.floor(t*4),kick=Math.sin(2*Math.PI*(54+bar*3)*t)*Math.exp(-beat*11)*.7,snare=(Math.random()*2-1)*Math.exp(-((t*2+.5)%1)*20)*((bar%4===2)?1:.25),tone=Math.sin(2*Math.PI*(220+[0,3,7,10][bar%4]*18)*t)*.06;d[i]=kick+snare*.16+tone+(Math.random()*2-1)*.02}buffer=b;chop()}async function loadFile(f){if(!(await audio()))return;try{buffer=await ctx.decodeAudioData(await f.arrayBuffer());chop();log('Audio loaded and chopped.')}catch(e){log('Could not decode audio. The browser has chosen drama.')}}function reverse(){if(!buffer)return log('Load audio first.');for(let c=0;c<buffer.numberOfChannels;c++)Array.prototype.reverse.call(buffer.getChannelData(c));chop();log('Audio reversed and re-chopped.')}async function midi(){if(!navigator.requestMIDIAccess){status('midiState','No MIDI','hot');return}try{let m=await navigator.requestMIDIAccess({sysex:false});m.inputs.forEach(x=>x.onmidimessage=ev=>{let[st,n,v]=ev.data,cmd=st&240,p=padMap.indexOf(n),key=(st&15)+':'+n;if(cmd===144&&v>0){if(midiHeld.has(key))return;midiHeld.add(key);p>-1?trigger(p,v/127):playHoss(n,v/127)}else if(cmd===128||(cmd===144&&v===0)){midiHeld.delete(key);if(p>-1)padUp(p)}});midiOuts=[...m.outputs.values()];status('midiState','MIDI ready','ok')}catch(e){status('midiState','MIDI blocked','hot')}}function drawWave(){let c=$('wave'),x=c.getContext('2d'),data=new Uint8Array(256);function draw(){let r=c.getBoundingClientRect(),dpr=Math.min(devicePixelRatio||1,2);if(c.width!==r.width*dpr){c.width=r.width*dpr;c.height=r.height*dpr}x.clearRect(0,0,c.width,c.height);x.strokeStyle='rgba(25,230,255,.16)';x.lineWidth=1;for(let i=0;i<16;i++){let xx=i*c.width/16;x.beginPath();x.moveTo(xx,0);x.lineTo(xx,c.height);x.stroke()}if(analyser)analyser.getByteFrequencyData(data);let mid=c.height*.5;x.lineWidth=2;for(let k=0;k<3;k++){x.beginPath();x.strokeStyle=k===0?'#19e6ff':k===1?'#ff34ef':'#ffb23b';for(let i=0;i<160;i++){let v=(data[i]||Math.sin(Date.now()/170+i)*45+60)/255,y=mid+(v-.5)*c.height*(.78-k*.16),xx=i/159*c.width;if(i)x.lineTo(xx,y);else x.moveTo(xx,y)}x.stroke()}requestAnimationFrame(draw)}draw()}function bind(){buildGrid();buildPads();buildKnobs();buildPiano();setGrid();$('startBtn').onclick=async()=>{await audio();log('Audio awake.')};$('demoBtn').onclick=demo;$('uploadBtn').onclick=()=>$('fileInput').click();$('fileInput').onchange=e=>e.target.files[0]&&loadFile(e.target.files[0]);$('midiBtn').onclick=midi;$('reverseBtn').onclick=reverse;$('panicBtn').onclick=()=>{stopAll(true);log('Stopped.')};$('modeBtn').onclick=()=>{let a=['oneshot','gate','loop'];mode=a[(a.indexOf(mode)+1)%a.length];$('modeBtn').textContent='Mode: '+modes[mode];$('modeMini').textContent=mode.toUpperCase()};$('chokeBtn').onclick=()=>{choke=!choke;$('chokeBtn').textContent='Choke: '+(choke?'On':'Off')};window.addEventListener('keydown',e=>{if(e.repeat)return;let i=q.indexOf(e.key.toLowerCase());if(i>-1){e.preventDefault();padDown(i)}});window.addEventListener('keyup',e=>{let i=q.indexOf(e.key.toLowerCase());if(i>-1){e.preventDefault();padUp(i)}})}bind()})();
